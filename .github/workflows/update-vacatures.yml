name: Update vacatures

on:
  schedule:
    - cron: "0 6 * * *" # elke dag 06:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run scraper
        run: node scripts/scraper.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/vacatures.json
          git commit -m "update vacatures" || exit 0
          git push